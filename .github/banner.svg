<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="320" fill="#0b1210"/>

  <!-- Subtle dot grid pattern -->
  <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="#1f2e27" opacity="0.8"/>
  </pattern>
  <rect width="1200" height="320" fill="url(#dots)"/>

  <!-- Left accent bar -->
  <rect x="64" y="64" width="3" height="192" rx="2" fill="#2d6a4f"/>

  <!-- Terminal prompt label -->
  <text x="84" y="106" font-family="'JetBrains Mono', 'Fira Code', Consolas, monospace" font-size="14" font-weight="500" fill="#7dd3b0" letter-spacing="1">$ whoami</text>

  <!-- Name — main heading -->
  <text x="84" y="168" font-family="'Exo 2', 'Segoe UI', system-ui, sans-serif" font-size="56" font-weight="700" fill="#dce8e2" letter-spacing="-1">Thomas Goodman</text>

  <!-- Role line in accent green -->
  <text x="86" y="210" font-family="'Exo 2', 'Segoe UI', system-ui, sans-serif" font-size="22" font-weight="600" fill="#52b788">Full-Stack Developer</text>

  <!-- Location / tagline -->
  <text x="87" y="240" font-family="'Open Sans', 'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="400" fill="#8aab98">Helensville, Auckland, NZ  ·  15+ years RNZAF  ·  thomasgoodman.me</text>

  <!-- Accent underline under name -->
  <rect x="84" y="178" width="48" height="2" rx="1" fill="#52b788"/>

  <!-- Right side — decorative terminal window -->
  <g transform="translate(760, 72)">
    <!-- Window frame -->
    <rect width="360" height="196" rx="10" fill="#111a16" stroke="#2a3d33" stroke-width="1"/>
    <!-- Title bar -->
    <rect width="360" height="36" rx="10" fill="#172219"/>
    <rect y="26" width="360" height="10" fill="#172219"/>
    <!-- Traffic lights -->
    <circle cx="18" cy="18" r="6" fill="#ff5f57"/>
    <circle cx="38" cy="18" r="6" fill="#ffbd2e"/>
    <circle cx="58" cy="18" r="6" fill="#28c840"/>
    <!-- Window label -->
    <text x="180" y="23" font-family="'JetBrains Mono', monospace" font-size="11" fill="#566e61" text-anchor="middle">tommy@thomasgoodman.me</text>
    <!-- Terminal content -->
    <text x="18" y="62" font-family="'JetBrains Mono', monospace" font-size="12" fill="#52b788">$ </text>
    <text x="36" y="62" font-family="'JetBrains Mono', monospace" font-size="12" fill="#dce8e2">node --version</text>
    <text x="18" y="82" font-family="'JetBrains Mono', monospace" font-size="12" fill="#8aab98">v22.0.0</text>
    <text x="18" y="106" font-family="'JetBrains Mono', monospace" font-size="12" fill="#52b788">$ </text>
    <text x="36" y="106" font-family="'JetBrains Mono', monospace" font-size="12" fill="#dce8e2">cat stack.txt</text>
    <text x="18" y="126" font-family="'JetBrains Mono', monospace" font-size="12" fill="#7dd3b0">Next.js · TypeScript · Node.js</text>
    <text x="18" y="144" font-family="'JetBrains Mono', monospace" font-size="12" fill="#7dd3b0">React · Tailwind · Docker</text>
    <text x="18" y="166" font-family="'JetBrains Mono', monospace" font-size="12" fill="#52b788">$ </text>
    <text x="36" y="166" font-family="'JetBrains Mono', monospace" font-size="12" fill="#dce8e2">echo "ready to build"</text>
    <text x="18" y="186" font-family="'JetBrains Mono', monospace" font-size="12" fill="#8aab98">ready to build<tspan fill="#52b788">_</tspan></text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="316" width="1200" height="4" fill="#2d6a4f"/>
</svg>
