name: Deploy site
on:
    push:
        branches: [main]
        paths:
            - site/**
            - .github/workflows/deploy.yml
    workflow_dispatch:
        inputs:
            clean_slate:
                description: "Delete all files on the server before upload"
                type: boolean
                default: false

permissions:
    contents: read

concurrency:
    group: production-deploy
    cancel-in-progress: false

jobs:
    deploy:
        name: Deploy static site via FTP
        runs-on: ubuntu-latest
        timeout-minutes: 15
        environment:
            name: production
            url: https://thomasgoodman.me

        steps:
            - name: Check out repository
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

            - name: Upload to Hostinger
              uses: SamKirkland/FTP-Deploy-Action@110f9186c050f71550953127052e77650219c287 # v4.4.0
              with:
                  server: ${{ secrets.FTP_SERVER }}
                  username: ${{ secrets.FTP_USERNAME }}
                  password: ${{ secrets.FTP_PASSWORD }}
                  protocol: ftps
                  local-dir: ./site/
                  server-dir: ./
                  dangerous-clean-slate: ${{ inputs.clean_slate }}
